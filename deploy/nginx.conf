server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Default mime.types (loaded by the main nginx.conf) already maps
    # .js -> application/javascript and .json -> application/json.

    # Gzip text-based assets, including the large vendored three.module.js
    # and the JSON geometry data.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Content-pinned assets (vendored three.js, binary earth textures) never
    # change without a filename change → cache hard.
    location ~* ^/(vendor|assets)/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The JSON data (karst.json, the cave surveys, tomography) DOES change
    # between deploys — must revalidate every load (ETag → 304 if unchanged),
    # never serve a stale copy. This is what previously kept the cave list empty.
    location ~* ^/data/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # HTML + JS: always revalidate too, so a redeploy is picked up immediately.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
