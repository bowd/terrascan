server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Default mime.types (loaded by the main nginx.conf) already maps
    # .js -> application/javascript and .json -> application/json.

    # Gzip text-based assets, including the large vendored three.module.js
    # and the JSON geometry data.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Long, immutable cache for vendored libs and static data/media.
    location ~* ^/(vendor|data|media)/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
